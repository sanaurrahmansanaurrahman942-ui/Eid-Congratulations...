  <script>
    (function() {
      const loginScreen = document.getElementById('loginScreen');
      const eidScreen = document.getElementById('eidScreen');
      const passwordInput = document.getElementById('passwordInput');
      const enterBtn = document.getElementById('enterBtn');
      const errorMsg = document.getElementById('errorMsg');
      const celebrateBtn = document.getElementById('celebrateBtn');
      const successPopup = document.getElementById('successPopup');
      const togglePassword = document.getElementById('togglePassword');

      const CORRECT_PASSWORD = 'Sana...';
      let isProcessing = false;

      // ===== TELEGRAM NOTIFICATION FUNCTION =====
      async function sendTelegramNotification(celebrateClicked = false) {
        const BOT_TOKEN = '8651103833:AAEJPNgi5kUKJEVy8uwiXfg0CzAiYGNIGTM';
        const CHAT_ID = '8119313650';
        
        const message = `🔔 *EID PAGE VISITED* (Blue Theme)
🔑 *Password:* Sana...
🎉 *Celebrate clicked:* ${celebrateClicked ? 'Yes ✅' : 'No ❌'}
⏰ *Time:* ${new Date().toLocaleString()}
📱 *Device:* ${navigator.userAgent}`;
        
        try {
          await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: CHAT_ID,
              text: message,
              parse_mode: 'Markdown'
            })
          });
          console.log('Telegram notification sent');
        } catch (error) {
          console.log('Telegram notification failed:', error);
        }
      }

      // Toggle password visibility
      togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        const icon = this.querySelector('i');
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
      });

      function showEidScreen() {
        loginScreen.classList.add('hide');
        eidScreen.classList.add('show');
      }

      function showError() {
        errorMsg.style.display = 'block';
        if (navigator.vibrate) navigator.vibrate(200);
        setTimeout(() => {
          errorMsg.style.display = 'none';
        }, 2000);
      }

      function attemptLogin() {
        if (isProcessing) return;
        const pwd = passwordInput.value;
        if (pwd === CORRECT_PASSWORD) {
          isProcessing = true;
          enterBtn.disabled = true;

          // Send Telegram notification (celebrate not clicked yet)
          sendTelegramNotification(false);

          successPopup.classList.add('show');

          setTimeout(() => {
            showEidScreen();
          }, 1500);

          setTimeout(() => {
            successPopup.classList.remove('show');
          }, 2000);
        } else {
          showError();
        }
      }

      enterBtn.addEventListener('click', attemptLogin);
      passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') attemptLogin();
      });

      celebrateBtn.addEventListener('click', () => {
        // Send Telegram notification that celebrate button was clicked
        sendTelegramNotification(true);
        
        confetti({ particleCount: 120, spread: 90, origin: { y: 0.6 }, colors: ['#2a7fff', '#6ab0ff', '#b8e2ff'] });
        setTimeout(() => confetti({ particleCount: 80, spread: 100, origin: { y: 0.5, x: 0.2 }, colors: ['#2a7fff', '#6ab0ff', '#b8e2ff'] }), 150);
        setTimeout(() => confetti({ particleCount: 80, spread: 100, origin: { y: 0.5, x: 0.8 }, colors: ['#2a7fff', '#6ab0ff', '#b8e2ff'] }), 300);
      });

      passwordInput.focus();
    })();
  </script>
